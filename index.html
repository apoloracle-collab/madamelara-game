<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madame Lara's Vault</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- FIXED: Corrected Adsgram SDK script file source name -->
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
</head>
<body>
    <div id="game-container">
        <div class="status-bar">
            <div class="user-info">
                <span>SLAVE STATUS</span>
            </div>
            <div class="score-box">
                <span class="icon">💎</span>
                <span id="score-display">0</span>
            </div>
            <div class="multiplier-box">
                <span id="multiplier-display">x1.00</span>
            </div>
            <div class="timer-box">
                <span class="icon">⏳</span>
                <span id="timer-display">45s</span>
            </div>
            <div class="energy-box">
                <span class="icon">⚡</span>
                <span id="energy-display">5/5</span>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="lara-target-container">
                <img id="lara-image" src="" alt="Madame Lara">
                <div id="target-overlay">TAP TO OBEY</div>
            </div>

            <h2 id="task-name">Loading Task...</h2>

            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="progress-text">0 / 0</div>
        </div>

        <div id="lobby-screen" class="screen active">
            <h1 class="welcome-title">Madame Lara's Chamber</h1>
            <p class="welcome-desc">Prove your absolute obedience to earn her diamonds.</p>
            <button id="start-btn" disabled>Loading Data...</button>
            <p id="bonus-notice" class="bonus-text"></p>
        </div>

        <div id="reward-modal" class="modal hidden">
            <div class="modal-content">
                <h2>SUCCESS!</h2>
                <p id="reward-desc">You have pleased Madame Lara.</p>
                <p id="reward-points" class="points-earned">+0 Diamonds</p>
                <button id="claim-btn">Claim & Continue</button>
            </div>
        </div>
    </div>
<div id="energy-modal" class="modal hidden">
    <div class="modal-content" style="text-align: center; border: 1px solid #ff4757;">
        <h2 style="color: #ff4757; margin-bottom: 10px;">Out of Energy</h2>
        <p style="margin-bottom: 20px;">Madame Lara has no time for you right now. Wait at the door or prove your loyalty.</p>
        <button id="watch-ad-btn" class="action-btn" style="background: linear-gradient(45deg, #ff4757, #ff6b81); width: 100%; margin-bottom: 10px;">
            📺 Watch Ad & Refill Energy
        </button>
        <button id="close-energy-modal" class="action-btn" style="background: transparent; border: 1px solid #ccc; width: 100%;">
            Close
        </button>
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
